# Lychee Link Checker Configuration - hf-internal-interface-wrap
# =============================================================================
# Based on official example: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml
# =============================================================================

timeout = 30
max_retries = 3
max_redirects = 10
retry_wait_time = 1
user_agent = "lychee/0.21.0"
method = "get"
insecure = false
exclude_all_private = true
include_mail = false
include_verbatim = false
skip_missing = false

# Jekyll site-relative links (/api/, /quick-start/) — no base URL in CI
exclude_path = [
  '.*docs/features\\.md$',
]

accept = ["200", "429", "403"]

exclude = [
  '^https://www\.gnu\.org/licenses/gpl-3\.0/?$',
  '^https://gnu\.org/licenses/gpl-3\.0/?$',
  '^https://www\.gnu\.org/licenses/gpl-3\.0\.html$',
  '^https://img\.shields\.io/badge/License-GPLv3-blue\.svg$',
  '^https?://(www\.)?gnu\.org/licenses/.*',
  '^https?://img\.shields\.io/badge/License-.*',

  '^https://github\.com/N3b3x/hf-internal-interface-wrap/actions/workflows/.*',
  '^https://n3b3x\.github\.io/hf-internal-interface-wrap/?.*',
]
